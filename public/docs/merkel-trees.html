<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Merkel Trees in Rust</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="topbar">
    <h1>Merkel Trees in Rust</h1>

    <!-- NEW: button on the right -->
    <button id="theme-btn" class="theme-btn">dark</button>
  </div>

  <nav>
    <a href="/index.html">home</a>
    <a href="/blog/index.html">blog</a>
    <a href="/docs/index.html">docs</a>
  </nav>

  <hr>
</header>

<main>
  <p>Designing a simple and efficient Merkel Tree in Rust.</p>
</main>

<footer>
  <hr>
  <p>© Joseph Bouryal</p>
</footer>

<script>
  const btn = document.getElementById("theme-btn");
  const saved = localStorage.getItem("theme");

  if (saved === "dark") document.documentElement.classList.add("dark");
  if (saved === "light") document.documentElement.classList.remove("dark");

  function updateText() {
    btn.textContent = document.documentElement.classList.contains("dark") ? "light" : "dark";
  }

  updateText();

  btn.addEventListener("click", () => {
    document.documentElement.classList.toggle("dark");
    const mode = document.documentElement.classList.contains("dark") ? "dark" : "light";
    localStorage.setItem("theme", mode);
    updateText();
  });
</script>

</body>
</html>
